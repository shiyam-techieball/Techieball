<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="./img/case-3.jpg">
    <!-- google icons -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=location_on" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Lawfice</title>
</head>

<body>

    <div class="main-container container">

        <!-- Location and Contact -->
        <div class="location-contact">
            <section class="section-container">
                <p><span class="material-symbols-outlined">location_on</span>123 Street, New York, USA</p>
                <p>Call Us for Inquiry:<span>+012 345 67890</span></p>
            </section>
        </div>

        <!-- Navbar Section -->
        <div class="main-nav">
            <nav class="nav-container">
                <div class="balanced">
                    <h1><i class="fa-solid fa-scale-balanced"></i>Lawfice</h1>
                </div>
                <div class="navigation-link">
                    <a href="#">Home</a>
                    <a href="#">About</a>
                    <a href="#">Practice Area</a>
                    <a href="#">Case Study</a>
                    <a href="#">Lawyer</a>
                    <a href="#">Blog</a>
                    <a href="#">Pages</a>
                    <a href="#">Contact</a>
                </div>
            </nav>
        </div>


        <!-- Hero Section -->
        <main>
            <section class="hero-banner">
                <div class="legal-Partner">
                    <div class="promo-hero">
                        <p>Your Trusted</p>
                        <p class="hero-span"><span>Legal</span> Partner</p>

                        <div>An Award Winning Law Firm Since 1990</div>
                    </div>
                </div>
                <div class="image">
                    <img src="./img/hero-slider-2.jpg" alt="Hero Slider 2" width="500px" height="400px">
                </div>
            </section>
        </main>



        <!-- Award -->
        <div class="divion-lawyer">
            <div class="divion-lawyer-section">
            <div class="award"><i class="fa-solid fa-award award-i"></i><span class="award-span">70</span>Award Winning</div>
            <div class="our Lawyers"><i class="fa-solid fa-people-line award-i"></i><span class="award-span">500</span>Our Lawyers</div>
            <div class="client-review"><i class="fa-solid fa-message award-i"></i><span class="award-span">7000</span>Client's Review</div>
            </div>
        </div>





    </div>


</body>

</html>
